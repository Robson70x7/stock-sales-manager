version: '3.8'

services:
  rn-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stock-sales-rn-dev
    image: stock-sales-rn-dev:latest
    volumes:
      - .:/app
      - rn-node-modules:/app/node_modules
    ports:
      - "8081:8081"
      - "8082:8082"
    environment:
      - NODE_ENV=development
      - ANDROID_HOME=/opt/android-sdk
      - ANDROID_SDK_ROOT=/opt/android-sdk
    stdin_open: true
    tty: true
    privileged: true

volumes:
  rn-node-modules: